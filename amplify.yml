version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - env
        - npm install
    build:
      commands:
        - env | grep -e API_BIBLE_API_KEY >> ./.env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  buildPath: /
