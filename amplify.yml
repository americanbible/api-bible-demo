version: 1
frontend:
  phases:
    preBuild:
      commands:
        - env
        - npm install
    build:
      commands:
        - env | grep -e API_BIBLE_API_KEY -e CACHE_BUCKET_NAME -e NEXT_BUILD_ID >> ./.env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  buildPath: /
